<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STEM Invitation — Group 6</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Neue+Haas+Grotesk+Display+Pro:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --white: #f5f5f7;
      --silver: #a1a1a6;
      --glass: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* Noise grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 24px;
    }

    /* Top eyebrow */
    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.1s forwards;
    }

    /* Main headline */
    .headline {
      font-size: clamp(56px, 10vw, 96px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.0;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.25s forwards;
    }

    .headline em {
      font-style: normal;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subhead */
    .subhead {
      font-size: clamp(17px, 2.5vw, 22px);
      font-weight: 300;
      color: var(--silver);
      text-align: center;
      max-width: 540px;
      line-height: 1.55;
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    /* Divider line */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
      margin-bottom: 64px;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }

    /* Info card */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 48px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
      opacity: 0;
      animation: fadeUp 1s ease 0.55s forwards;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr 1px 1fr;
      gap: 0;
      align-items: start;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 8px 16px;
      gap: 10px;
    }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .info-icon svg {
      width: 17px;
      height: 17px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .info-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--silver);
      font-weight: 500;
    }

    .info-value {
      font-size: 17px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .col-sep {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
      align-self: center;
    }

    /* Group badge */
    .group-badge {
      margin-top: 36px;
      padding-top: 36px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .badge-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--silver);
      text-transform: uppercase;
    }

    /* CTA button */
    .cta-wrap {
      margin-top: 48px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 14px 32px;
      border-radius: 980px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .cta:hover {
      background: #e0e0e0;
      transform: scale(1.025);
      box-shadow: 0 8px 30px rgba(255,255,255,0.15);
    }

    .cta svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s ease;
    }

    .cta:hover svg { transform: translateX(3px); }

    /* Footer */
    .footer {
      margin-top: 80px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease 1.1s forwards;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 520px) {
      .info-grid { grid-template-columns: 1fr; gap: 24px; }
      .col-sep { display: none; }
      .card { padding: 36px 28px; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <!-- Logo: replace src with your actual logo file path -->
  <div style="position:fixed; top:24px; left:28px; z-index:10;">
    <img src="helo.png" alt="Logo"
      style="height:78px; width:auto; object-fit:contain; opacity:0.9;" />
  </div>

  <div class="wrapper">

    <p class="eyebrow">You're Invited</p>

    <h1 class="headline">STEM<br/><em>Presentation</em></h1>

    <p class="subhead">
      An exploration of science, technology, engineering, and mathematics —
      brought to life by Group 6.

    <div class="divider"></div>

    <div class="card">
      <div class="info-grid">

        <!-- Date -->
        <div class="info-item">
          <div class="info-icon">

        <!-- Time -->
        <div class="info-item">

        <div class="col-sep"></div>

        <!-- Venue -->
        <div class="info-item">
          <div class="info-icon">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>

      </div>

      <div class="group-badge">
        <div class="badge-dot"></div>
        <span class="badge-text">Presented by Group 6</span>
        <div class="badge-dot"></div>
      </div>
    </div>

    <div class="cta-wrap">
      <a class="cta" href="https://youtu.be/2pe5l65CF0g" target="_blank">
        🎁 Claim Free ₹100 Coupon
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
